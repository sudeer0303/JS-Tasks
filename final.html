<!DOCTYPE html>
<html>
<head>
<title>E-Commerce Dashboard</title>

<style>

/* ===== BASIC STYLE ===== */
body{
font-family:Arial;
margin:0;
padding:0;
background:#f5f5f5;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
padding:15px;
background:black;
color:white;
}

.controls{
padding:10px;
text-align:center;
}

/* GRID */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
padding:20px;
}

/* CARD */
.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
}

.card img{
width:100px;
height:100px;
object-fit:contain;
}

button{
padding:8px;
margin:5px;
cursor:pointer;
}

/* CART */
.cart{
background:white;
padding:15px;
margin:20px;
}

</style>

</head>
<body>

<div class="header">
<h2>Product Dashboard</h2>
<h3>Cart: <span id="cartCount">0</span></h3>
</div>

<div class="controls">

<input type="text" id="search" placeholder="Search product...">

<select id="category">
<option value="">All Categories</option>
<option value="men's clothing">Men</option>
<option value="women's clothing">Women</option>
<option value="electronics">Electronics</option>
<option value="jewelery">Jewelry</option>
</select>

<button onclick="sortLow()">Low → High</button>
<button onclick="sortHigh()">High → Low</button>

</div>

<h3 id="loading">Loading...</h3>

<div class="products" id="productList"></div>

<div class="cart">
<h3>Cart Items</h3>
<div id="cartItems"></div>
<h4>Total: ₹<span id="total">0</span></h4>
</div>

<script>

let allProducts = []
let cart = []

// =======================
// FETCH PRODUCTS
// =======================
fetch("https://fakestoreapi.com/products")
.then(res => res.json())
.then(data => {

document.getElementById("loading").style.display = "none"

allProducts = data
displayProducts(data)

})
.catch(err => {
document.getElementById("loading").innerText = "Error loading data"
})


// =======================
// DISPLAY PRODUCTS
// =======================
function displayProducts(products){

let html = ""

products.forEach(p => {

html += `
<div class="card">
<img src="${p.image}">
<h4>${p.title.slice(0,50)}</h4>
<p>₹${p.price}</p>
<p>${p.category}</p>
<p>⭐ ${p.rating.rate}</p>
<button onclick="addToCart(${p.id})">Add to Cart</button>
</div>
`

})

document.getElementById("productList").innerHTML = html

}


// =======================
// SEARCH
// =======================
document.getElementById("search").addEventListener("input",function(){

let value = this.value.toLowerCase()

let filtered = allProducts.filter(p => 
p.title.toLowerCase().includes(value) ||
p.category.toLowerCase().includes(value)
)

displayProducts(filtered)

})


// =======================
// CATEGORY FILTER
// =======================
document.getElementById("category").addEventListener("change",function(){

let value = this.value

if(value === ""){
displayProducts(allProducts)
}else{
let filtered = allProducts.filter(p => p.category === value)
displayProducts(filtered)
}

})


// =======================
// SORT
// =======================
function sortLow(){
let sorted = [...allProducts].sort((a,b)=>a.price-b.price)
displayProducts(sorted)
}

function sortHigh(){
let sorted = [...allProducts].sort((a,b)=>b.price-a.price)
displayProducts(sorted)
}


// =======================
// CART
// =======================
function addToCart(id){

let product = allProducts.find(p => p.id === id)

cart.push(product)

document.getElementById("cartCount").innerText = cart.length

displayCart()

}


// =======================
// DISPLAY CART
// =======================
function displayCart(){

let html = ""

cart.forEach((item,index)=>{

html += `
<p>
${item.title} - ₹${item.price}
<button onclick="removeItem(${index})">Remove</button>
</p>
`

})

document.getElementById("cartItems").innerHTML = html

// TOTAL
let total = cart.reduce((sum,item)=> sum + item.price,0)

document.getElementById("total").innerText = total.toFixed(2)

}


// =======================
// REMOVE
// =======================
function removeItem(index){

cart.splice(index,1)

document.getElementById("cartCount").innerText = cart.length

displayCart()

}

</script>

</body>
</html>
