
<!DOCTYPE html>
<html>
<body>

<script>

let num1 = Number(prompt("Enter first number"))
let num2 = Number(prompt("Enter second number"))

let operation = prompt("Choose operation (+ - * /)")

let result

switch(operation){

case "+":
result = num1 + num2
break

case "-":
result = num1 - num2
break

case "*":
result = num1 * num2
break

case "/":
result = num1 / num2
break

default:
result = "Invalid operation"

}

console.log("Result:", result)
alert("Result: " + result)

</script>

</body>
</html>
